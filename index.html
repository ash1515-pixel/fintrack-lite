<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FinTrack Lite</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header>
      <h1>FinTrack Lite</h1>
      <p>Track income, expenses, and monthly spending patterns.</p>
    </header>

    <section class="cards" id="summary"></section>

    <section class="layout">
      <article class="panel">
        <h2>Add Transaction</h2>
        <form id="txnForm">
          <input name="title" required placeholder="Title" maxlength="60" />
          <input name="amount" required type="number" step="0.01" placeholder="Amount" />
          <select name="type">
            <option value="income">Income</option>
            <option value="expense">Expense</option>
          </select>
          <select name="category">
            <option>Salary</option>
            <option>Food</option>
            <option>Transport</option>
            <option>Shopping</option>
            <option>Bills</option>
            <option>Freelance</option>
          </select>
          <input name="date" type="date" required />
          <button>Add</button>
        </form>
      </article>

      <article class="panel">
        <h2>Expense by Category</h2>
        <canvas id="chart" width="640" height="320"></canvas>
      </article>
    </section>

    <section class="panel">
      <h2>Transactions</h2>
      <div id="list"></div>
    </section>

    <script src="script.js"></script>
  </body>
</html>
