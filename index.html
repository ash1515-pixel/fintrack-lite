<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FinTrack Lite</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="glow glow-one"></div>
    <div class="glow glow-two"></div>

    <header>
      <div>
        <h1>FinTrack Lite</h1>
        <p>Personal finance dashboard with monthly analytics and budget coaching.</p>
      </div>
      <div class="header-actions">
        <input id="monthFilter" type="month" />
        <button id="exportCsvBtn" class="secondary">Export CSV</button>
      </div>
    </header>

    <section class="cards" id="summary"></section>

    <section class="ai-panel panel">
      <div>
        <h2>AI Finance Coach</h2>
        <p>Get automated insights and recommendations from your spending trends.</p>
      </div>
      <div class="ai-actions">
        <button id="aiInsightsBtn">Generate AI Insights</button>
        <button id="smartBudgetBtn" class="secondary">AI Smart Budget</button>
      </div>
      <ul id="aiInsights"></ul>
    </section>

    <section class="layout">
      <article class="panel">
        <h2>Add Transaction</h2>
        <form id="txnForm">
          <input name="title" required placeholder="Title" maxlength="60" />
          <input name="amount" required type="number" step="0.01" min="0.01" placeholder="Amount" />
          <select name="type">
            <option value="income">Income</option>
            <option value="expense">Expense</option>
          </select>
          <select name="category">
            <option>Salary</option>
            <option>Food</option>
            <option>Transport</option>
            <option>Shopping</option>
            <option>Bills</option>
            <option>Freelance</option>
          </select>
          <input name="date" type="date" required />
          <button>Add Transaction</button>
        </form>
      </article>

      <article class="panel">
        <h2>Set Category Budget</h2>
        <form id="budgetForm">
          <select name="category">
            <option>Food</option>
            <option>Transport</option>
            <option>Shopping</option>
            <option>Bills</option>
          </select>
          <input name="amount" required type="number" min="1" step="1" placeholder="Budget amount" />
          <button>Save Budget</button>
        </form>
        <div id="budgetList" class="budget-list"></div>
      </article>
    </section>

    <section class="panel">
      <h2>Expense by Category</h2>
      <canvas id="chart" width="900" height="320"></canvas>
    </section>

    <section class="panel">
      <h2>Transactions</h2>
      <div id="list"></div>
    </section>

    <script src="script.js"></script>
  </body>
</html>
